<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EDAIC Rapid Viva</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #162028;
      --ink-soft: #43535f;
      --brand: #0f766e;
      --brand-dark: #0a524d;
      --line: #d8d4c7;
      --surface: #fffdf8;
      --shadow: 0 18px 40px rgba(13, 37, 48, 0.14);
      --radius: 16px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Space Grotesk", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 12% 8%, rgba(232, 137, 46, 0.13), transparent 38%),
        radial-gradient(circle at 90% 0%, rgba(15, 118, 110, 0.18), transparent 35%),
        linear-gradient(180deg, #f4efe1 0%, #f8f6ef 56%, #f3f4ef 100%);
      min-height: 100vh;
      line-height: 1.45;
      padding: 1.3rem;
    }

    .shell {
      width: min(1100px, 100%);
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.64);
      border: 1px solid rgba(216, 212, 199, 0.76);
      border-radius: 20px;
      backdrop-filter: blur(7px);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .topbar {
      padding: 0.95rem 1.2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--line);
    }

    .brand {
      font-family: "Fraunces", Georgia, serif;
      font-size: 1.25rem;
    }

    .brand span {
      color: var(--brand);
    }

    .meta {
      color: var(--ink-soft);
      font-size: 0.9rem;
    }

    .hero {
      padding: 1.3rem 1.2rem 0.6rem;
    }

    .title {
      font-family: "Fraunces", Georgia, serif;
      font-size: clamp(1.8rem, 4vw, 2.7rem);
      line-height: 1.08;
      margin-bottom: 0.45rem;
      max-width: 16ch;
    }

    .subtitle {
      color: var(--ink-soft);
      font-size: 1rem;
      max-width: 56ch;
      margin-bottom: 0.9rem;
    }

    .layout {
      padding: 0 1.2rem 1.2rem;
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 1rem;
    }

    .left-panel,
    .right-panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 1rem;
      background: var(--surface);
    }

    .left-panel {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }

    .category-select {
      width: fit-content;
      margin-top: 0.9rem;
      padding: 0.6rem 0.7rem;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #ffffff;
      color: var(--ink);
      font-family: inherit;
      font-size: 0.88rem;
      cursor: pointer;
    }

    .question-btn {
      width: 100%;
      text-align: left;
      font-weight: 600;
      border: 0;
      border-radius: 12px;
      padding: 0.82rem 0.95rem;
      background: var(--brand);
      color: #ffffff;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.2s ease;
    }

    .question-btn:hover {
      background: var(--brand-dark);
      transform: translateY(-1px);
    }

    .mini {
      color: var(--ink-soft);
      font-size: 0.9rem;
    }

    .progress {
      font-size: 0.82rem;
      color: var(--ink-soft);
      padding: 0.35rem 0.6rem;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #ffffff;
      width: fit-content;
    }

    .nav-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
    }

    .nav-btn {
      width: 34px;
      height: 34px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--line);
      border-radius: 50%;
      background: #ffffff;
      color: var(--brand-dark);
      font-size: 1.2rem;
      line-height: 1;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.2s ease;
    }

    .nav-btn:hover {
      background: rgba(15, 118, 110, 0.1);
      transform: translateY(-1px);
    }

    .label {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--ink-soft);
      margin-bottom: 0.5rem;
    }

    .answer-field {
      width: 100%;
      min-height: 286px;
      border: 1px solid #ced6cc;
      border-radius: 10px;
      padding: 0.9rem;
      font-size: 0.98rem;
      line-height: 1.45;
      color: var(--ink);
      background: #ffffff;
      font-family: inherit;
      white-space: pre-wrap;
      overflow: auto;
    }

    .answer-field .empty {
      color: var(--ink-soft);
      font-style: italic;
    }

    .answer-field p {
      margin-bottom: 0.9rem;
    }

    .answer-field p:last-child {
      margin-bottom: 0;
    }

    .answer-field.is-hidden {
      display: none;
    }

    .reveal-btn {
      width: 100%;
      border: 1px dashed var(--brand);
      border-radius: 10px;
      padding: 0.9rem;
      margin-bottom: 0.8rem;
      background: rgba(15, 118, 110, 0.06);
      color: var(--brand-dark);
      font-weight: 600;
      font-family: inherit;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .reveal-btn:hover {
      background: rgba(15, 118, 110, 0.12);
    }

    .reveal-btn.is-hidden {
      display: none;
    }

    .kw {
      text-decoration: underline dotted;
      text-underline-offset: 2px;
      cursor: help;
      font-weight: 600;
      color: #0b5f58;
    }

    .drug-tip {
      position: fixed;
      max-width: 300px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fffefb;
      box-shadow: 0 12px 26px rgba(12, 30, 40, 0.2);
      padding: 0.65rem 0.75rem;
      font-size: 0.86rem;
      color: var(--ink);
      display: none;
      z-index: 50;
      pointer-events: auto;
    }

    .drug-tip a {
      color: var(--brand-dark);
      font-weight: 600;
    }

    @media (max-width: 760px) {
      body {
        padding: 0.8rem;
      }

      .layout {
        grid-template-columns: 1fr;
      }

      .title {
        max-width: none;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div class="brand">become<span>DESAIC</span>.com</div>
    </header>

    <section class="hero">
      <select class="category-select" id="categorySelect" aria-label="Filter by category"></select>
    </section>

    <section class="layout">
      <section class="left-panel">
        <button class="question-btn" id="questionBtn" type="button">How does cisatracurium differ from atracurium?</button>
        <div class="nav-row">
          <button class="nav-btn" id="prevBtn" type="button" aria-label="Previous question">&#8249;</button>
          <div class="progress" id="progressText">Question 1 of 11</div>
          <button class="nav-btn" id="nextBtn" type="button" aria-label="Next question">&#8250;</button>
        </div>
      </section>

      <section class="right-panel">
        <button class="reveal-btn" id="revealBtn" type="button">Show answer</button>
        <div class="answer-field" id="answerField" aria-label="Answer field"></div>
      </section>
    </section>
  </main>

  <div class="drug-tip" id="drugTip">
    Dantrolene: direct-acting skeletal muscle relaxant and ryanodine receptor antagonist used for malignant hyperthermia.
    <br>
    <a href="#" id="dantroleneLink">Go to dantrolene question</a>
  </div>

  <script src="qa-data.js"></script>
  <script>
    const qaPairs = Array.isArray(window.qaPairs) ? window.qaPairs : [];

    const questionBtn = document.getElementById("questionBtn");
    const answerField = document.getElementById("answerField");
    const revealBtn = document.getElementById("revealBtn");
    const progressText = document.getElementById("progressText");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const categorySelect = document.getElementById("categorySelect");
    const dantroleneLink = document.getElementById("dantroleneLink");

    const ALL_VALUE = "__all__";
    const CATEGORY_ORDER = [
      "clinical_anaesthesia",
      "physics_physiology",
      "pharmacology_clinical_measurements",
      "anatomy",
      "best_book",
      "anae_doc",
      "ABC_Verbal",
      "WTF",
    ];
    const CATEGORY_LABELS = {
      clinical_anaesthesia: "Clinical Anaesthesia",
      physics_physiology: "Physics & Physiology",
      pharmacology_clinical_measurements: "Pharmacology & Clinical Measurements",
      anatomy: "Anatomy",
      best_book: "Best Book",
      anae_doc: "Anaesthesia Documents",
      ABC_Verbal: "ABC Verbal / Viva Scenarios",
      WTF: "Uncategorized",
    };

    let activePairs = qaPairs;
    let currentIndex = 0;
    let activeDrugKeyword = null;
    let hideTipTimer = null;

    function populateCategorySelect() {
      const counts = {};
      qaPairs.forEach((p) => {
        counts[p.section] = (counts[p.section] || 0) + 1;
      });

      const sections = Object.keys(counts).sort((a, b) => {
        const ai = CATEGORY_ORDER.indexOf(a);
        const bi = CATEGORY_ORDER.indexOf(b);
        if (ai === -1 && bi === -1) return a.localeCompare(b);
        if (ai === -1) return 1;
        if (bi === -1) return -1;
        return ai - bi;
      });

      const options = [`<option value="${ALL_VALUE}">All categories (${qaPairs.length})</option>`];
      for (const section of sections) {
        const label = CATEGORY_LABELS[section] || section;
        options.push(`<option value="${escapeHtml(section)}">${escapeHtml(label)} (${counts[section]})</option>`);
      }
      categorySelect.innerHTML = options.join("");
    }

    function applyCategory(section) {
      activePairs = section === ALL_VALUE ? qaPairs : qaPairs.filter((p) => p.section === section);
      currentIndex = 0;
      renderPair(currentIndex);
    }

    function escapeHtml(text) {
      return text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function decorateAnswer(text) {
      return escapeHtml(text).replace(/\b(dantrolene|dantrolen)\b/gi, '<span class="kw" data-drug="dantrolene">$1</span>');
    }

    // Answers are stored as one long comma-joined string. Split into
    // comma-separated phrases (ignoring commas inside parentheses/brackets
    // so things like "1-2 ug/kg (induction)" stay whole), then regroup a
    // few phrases at a time into paragraphs so the text reads in chunks
    // instead of one wall of text or one bullet per phrase.
    function splitPhrases(answer) {
      const phrases = [];
      let depth = 0;
      let current = "";
      for (const char of answer) {
        if (char === "(" || char === "[") depth++;
        if (char === ")" || char === "]") depth--;
        if (char === "," && depth <= 0) {
          phrases.push(current.trim());
          current = "";
        } else {
          current += char;
        }
      }
      if (current.trim()) phrases.push(current.trim());
      return phrases.filter(Boolean);
    }

    function splitParagraphs(answer) {
      const phrases = splitPhrases(answer);
      const paragraphs = [];
      let current = [];
      let currentLength = 0;

      for (const phrase of phrases) {
        current.push(phrase);
        currentLength += phrase.length;
        const endsSentence = /[.!?]$/.test(phrase);
        if (current.length >= 4 || currentLength >= 160 || endsSentence) {
          paragraphs.push(current.join(", "));
          current = [];
          currentLength = 0;
        }
      }
      if (current.length) paragraphs.push(current.join(", "));
      return paragraphs;
    }

    function renderPair(index) {
      if (!activePairs.length) {
        questionBtn.textContent = "No questions in this category";
        answerField.textContent = "";
        progressText.textContent = "Question 0 of 0";
        return;
      }

      const pair = activePairs[index];
      questionBtn.textContent = pair.question;

      if (!pair.answer.trim()) {
        answerField.innerHTML = '<span class="empty">No answer written yet.</span>';
      } else {
        const paragraphs = splitParagraphs(pair.answer);
        answerField.innerHTML = paragraphs.map((p) => `<p>${decorateAnswer(p)}</p>`).join("");
      }

      answerField.classList.add("is-hidden");
      revealBtn.classList.remove("is-hidden");
      revealBtn.textContent = "Show answer";

      progressText.textContent = `Question ${index + 1} of ${activePairs.length}`;
    }

    function showDrugTip(target) {
      const rect = target.getBoundingClientRect();
      drugTip.style.display = "block";
      drugTip.style.left = `${rect.left + window.scrollX}px`;
      drugTip.style.top = `${rect.bottom + window.scrollY + 8}px`;
    }

    function scheduleHideDrugTip() {
      clearTimeout(hideTipTimer);
      hideTipTimer = setTimeout(() => {
        if (!activeDrugKeyword) {
          drugTip.style.display = "none";
        }
      }, 120);
    }

    questionBtn.addEventListener("click", () => {
      if (!activePairs.length) {
        return;
      }
      currentIndex = (currentIndex + 1) % activePairs.length;
      renderPair(currentIndex);
    });

    prevBtn.addEventListener("click", () => {
      if (!activePairs.length) {
        return;
      }
      currentIndex = (currentIndex - 1 + activePairs.length) % activePairs.length;
      renderPair(currentIndex);
    });

    nextBtn.addEventListener("click", () => {
      if (!activePairs.length) {
        return;
      }
      currentIndex = (currentIndex + 1) % activePairs.length;
      renderPair(currentIndex);
    });

    revealBtn.addEventListener("click", () => {
      const isHidden = answerField.classList.toggle("is-hidden");
      revealBtn.textContent = isHidden ? "Show answer" : "Hide answer";
    });

    categorySelect.addEventListener("change", () => {
      applyCategory(categorySelect.value);
    });

    const drugTip = document.getElementById("drugTip");

    answerField.addEventListener("mouseover", (event) => {
      const hovered = event.target.closest(".kw[data-drug='dantrolene']");
      if (!hovered) {
        return;
      }
      activeDrugKeyword = hovered;
      clearTimeout(hideTipTimer);
      showDrugTip(hovered);
    });

    answerField.addEventListener("mouseout", (event) => {
      const fromKeyword = event.target.closest(".kw[data-drug='dantrolene']");
      if (!fromKeyword) {
        return;
      }

      const movingTo = event.relatedTarget;
      if (movingTo && drugTip.contains(movingTo)) {
        return;
      }

      activeDrugKeyword = null;
      scheduleHideDrugTip();
    });

    drugTip.addEventListener("mouseenter", () => {
      clearTimeout(hideTipTimer);
    });

    drugTip.addEventListener("mouseleave", () => {
      activeDrugKeyword = null;
      scheduleHideDrugTip();
    });

    dantroleneLink.addEventListener("click", (event) => {
      event.preventDefault();
      const target = qaPairs.find((pair) => /\bdantrolene\b/i.test(pair.question) || /\bdantrolene\b/i.test(pair.answer));
      if (target) {
        categorySelect.value = ALL_VALUE;
        applyCategory(ALL_VALUE);
        currentIndex = activePairs.indexOf(target);
        renderPair(currentIndex);
      }
      activeDrugKeyword = null;
      drugTip.style.display = "none";
    });

    populateCategorySelect();
    categorySelect.value = ALL_VALUE;
    applyCategory(ALL_VALUE);
  </script>
</body>
</html>
